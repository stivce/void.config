---
- name: Configure a void.install box
  hosts: all
  gather_facts: true
  # Run pending handlers even if the play fails — otherwise an aborted run
  # can leave e.g. /etc/default/grub edited but grub.cfg never regenerated.
  force_handlers: true
  roles:
    - system
    - flathub
    - packages_base
    - packages_desktop
    - packages_gaming
    # Last: needs zsh, hyprland and the desktop apps in place before the
    # symlinked configs take over from any generated/managed defaults.
    - dotfiles
