---
- name: "Gaming_utils: GameMode + MangoHud"
  community.general.xbps:
    name:
      - gamemode
      - libgamemode-32bit
      - MangoHud
      - MangoHud-32bit
    state: latest

- name: "Steam: install"
  community.general.xbps:
    name: steam
    state: latest

- name: "Protonplus: install"
  community.general.xbps:
    name: protonplus
    state: latest

- name: "Prism_launcher: Minecraft"
  community.general.xbps:
    name:
      - PrismLauncher
      - openjdk21
    state: latest

- name: "Wow_umu: Battle.net via umu-launcher"
  become: true
  become_user: "{{ ansible_user }}"
  block:
    - name: Install 32-bit libraries (as root)
      become: true
      become_user: root
      community.general.xbps:
        name:
          - glibc-32bit
          - libgcc-32bit
        state: latest

    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.local/bin"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Download umu-launcher zipapp
      ansible.builtin.get_url:
        url: "{{ packages_gaming_wow_umu_release_url }}"
        dest: /tmp/umu.tar
        mode: "0644"

    - name: Extract umu-launcher zipapp
      ansible.builtin.unarchive:
        src: /tmp/umu.tar
        dest: /tmp/
        remote_src: true

    - name: Install umu-run
      ansible.builtin.copy:
        src: /tmp/umu/umu-run
        dest: "/home/{{ ansible_user }}/.local/bin/umu-run"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        remote_src: true

    - name: Ensure ~/.local/bin is on PATH
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/{{ item }}"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      loop:
        - .zshrc
        - .profile

    - name: Install the battlenet launcher script
      ansible.builtin.template:
        src: battlenet.sh.j2
        dest: "/home/{{ ansible_user }}/.local/bin/battlenet"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

- name: "Discord: install via flatpak"
  block:
    - name: Install flatpak
      community.general.xbps:
        name: flatpak
        state: present

    - name: Add flathub remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Discord
      community.general.flatpak:
        name: com.discordapp.Discord
        state: present
        remote: flathub

- name: "Curseforge: prepare PATH (AppImage download is manual)"
  block:
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.local/bin"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure ~/.local/bin is on PATH
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/{{ item }}"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      loop:
        - .zshrc
        - .profile

    - name: Reminder to download the AppImage manually
      ansible.builtin.debug:
        msg: >-
          There's no stable direct-download URL for CurseForge — download the
          AppImage from curseforge.com yourself, then: chmod +x it and move
          it to ~/.local/bin/curseforge.AppImage (see gaming.md Part 6).
