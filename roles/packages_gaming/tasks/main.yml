---
- name: "Gaming_utils: GameMode + MangoHud"
  community.general.xbps:
    name:
      - gamemode
      - libgamemode-32bit
      - MangoHud
      - MangoHud-32bit
    state: latest

- name: "Steam: install"
  community.general.xbps:
    name: steam
    state: latest

- name: "Protonplus: install"
  community.general.xbps:
    name: protonplus
    state: latest

- name: "Prism_launcher: Minecraft"
  community.general.xbps:
    name:
      - PrismLauncher
      - openjdk21
    state: latest

- name: "Local_bin: ~/.local/bin for user-installed launchers"
  block:
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.local/bin"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # .zshenv is read by every zsh — before .zprofile — so the PATH is
    # already exported when .zprofile execs start-hyprland and is inherited
    # by everything launched inside the Hyprland session (wofi, etc.).
    - name: Ensure ~/.local/bin is on PATH
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.zshenv"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

- name: "Wow_umu: Battle.net via umu-launcher"
  become: true
  become_user: "{{ ansible_user }}"
  block:
    - name: Install 32-bit libraries (as root)
      become: true
      become_user: root
      community.general.xbps:
        name:
          - glibc-32bit
          - libgcc-32bit
        state: latest

    - name: Look up the latest umu-launcher release
      ansible.builtin.uri:
        url: "{{ packages_gaming_umu_latest_api_url }}"
        return_content: true
      register: packages_gaming_umu_release

    - name: Resolve the zipapp asset URL
      ansible.builtin.set_fact:
        packages_gaming_umu_url: >-
          {{ packages_gaming_umu_release.json.assets
             | selectattr('name', 'search', 'zipapp')
             | map(attribute='browser_download_url')
             | first }}

    # The versioned filename doubles as the idempotence check: a new
    # release means a new name, so only then is anything re-downloaded.
    - name: Download the latest umu-launcher zipapp
      ansible.builtin.get_url:
        url: "{{ packages_gaming_umu_url }}"
        dest: "/tmp/{{ packages_gaming_umu_url | basename }}"
        mode: "0644"

    - name: Extract umu-launcher zipapp
      ansible.builtin.unarchive:
        src: "/tmp/{{ packages_gaming_umu_url | basename }}"
        dest: /tmp/
        remote_src: true

    - name: Install umu-run
      ansible.builtin.copy:
        src: /tmp/umu/umu-run
        dest: "/home/{{ ansible_user }}/.local/bin/umu-run"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        remote_src: true

    - name: Install the battlenet launcher script
      ansible.builtin.template:
        src: battlenet.sh.j2
        dest: "/home/{{ ansible_user }}/.local/bin/battlenet"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

# flatpak + flathub remote themselves come from the shared flathub role.
- name: "Discord: install via flatpak"
  community.general.flatpak:
    name: com.discordapp.Discord
    state: latest
    remote: flathub

# ~/.local/bin dir + PATH are handled by the Local_bin tasks above.
- name: "Curseforge: reminder (AppImage download is manual)"
  ansible.builtin.debug:
    msg: >-
      There's no stable direct-download URL for CurseForge — download the
      AppImage from curseforge.com yourself, then: chmod +x it and move
      it to ~/.local/bin/curseforge.AppImage (see gaming.md Part 6).
