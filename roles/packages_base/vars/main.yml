---
# Post-install-guide.md features (Parts 1-14 are handled by void-install.sh
# already; Part 16, the fastest mirror, is handled by the system role).
packages_base_features:
  - id: dns_fix
    desc: "Fix DNS (dhcpcd overwrites resolv.conf on every restart — pin 1.1.1.1/8.8.8.8 via resolv.conf.head)"
  - id: nvidia
    desc: "NVIDIA proprietary driver + DRM kernel mode setting (enables the nonfree repo)"
  - id: multilib
    desc: "32-bit multilib libraries (needed for Steam/Proton)"
  - id: zsh
    desc: "ZSH shell + completions (sets it as the login shell for you and root)"
  - id: oh_my_zsh
    desc: "Oh My Zsh framework (curl | sh installer) — only applies if ZSH was chosen"
  - id: hyprland
    desc: "Hyprland Wayland compositor (community repo) + example config"
  - id: autologin_hyprland
    desc: "Autologin on TTY1 + autostart Hyprland from .zprofile — only applies if Hyprland was chosen"
  - id: neovim_fastfetch
    desc: "Neovim + Fastfetch config generation"
  - id: zen_browser
    desc: "Zen Browser via Flatpak"
  - id: ntp
    desc: "Chrony NTP time sync"
  - id: boot_optimization
    desc: "Boot tweaks: 1s GRUB timeout, drop unused TTYs 4-6, ensure btrfs ssd/compress mount options"
