---
- name: Ask which install-guide.md features to apply
  ansible.builtin.pause:
    prompt: "Apply '{{ item.id }}' — {{ item.desc }}? [y/N]"
  register: packages_base_prompts
  loop: "{{ packages_base_features }}"
  loop_control:
    label: "{{ item.id }}"

- name: Record approved features
  ansible.builtin.set_fact:
    packages_base_approved: >-
      {{
        packages_base_prompts.results
        | selectattr('user_input', 'defined')
        | selectattr('user_input', 'match', '(?i)^(y|yes)$')
        | map(attribute='item.id')
        | list
      }}

- name: Show approved features
  ansible.builtin.debug:
    msg: "Approved: {{ packages_base_approved }}"

- name: "dns_fix: pin reliable DNS servers"
  when: "'dns_fix' in packages_base_approved"
  block:
    - name: Write resolv.conf.head
      ansible.builtin.copy:
        dest: /etc/resolv.conf.head
        content: |
          nameserver 1.1.1.1
          nameserver 8.8.8.8
        mode: "0644"

    - name: Restart dhcpcd to apply
      ansible.builtin.command: sv restart dhcpcd
      changed_when: true

- name: "nvidia: proprietary driver + KMS"
  when: "'nvidia' in packages_base_approved"
  block:
    - name: Enable nonfree repo
      community.general.xbps:
        name: void-repo-nonfree
        state: present

    - name: Refresh package index for the new repo
      community.general.xbps:
        update_cache: true

    - name: Install NVIDIA driver packages
      community.general.xbps:
        name:
          - nvidia
          - nvidia-vaapi-driver
        state: latest

    - name: Enable NVIDIA DRM kernel mode setting in GRUB cmdline
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^GRUB_CMDLINE_LINUX_DEFAULT="
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="loglevel=4 nvidia_drm.modeset=1"'

    - name: Load NVIDIA kernel modules at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/nvidia.conf
        content: |
          nvidia
          nvidia_modeset
          nvidia_uvm
          nvidia_drm
        mode: "0644"

    - name: Regenerate GRUB config
      ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true

- name: "multilib: 32-bit libraries for Steam/Proton"
  when: "'multilib' in packages_base_approved"
  block:
    - name: Enable multilib repos
      community.general.xbps:
        name:
          - void-repo-multilib
          - void-repo-multilib-nonfree
        state: present

    - name: Refresh package index for the new repos
      community.general.xbps:
        update_cache: true

    - name: Install 32-bit base libraries
      community.general.xbps:
        name: >-
          {{
            ['glibc-32bit', 'libgcc-32bit', 'libstdc++-32bit']
            + (['nvidia-libs-32bit'] if 'nvidia' in packages_base_approved else [])
          }}
        state: latest

- name: "zsh: shell + completions"
  when: "'zsh' in packages_base_approved"
  block:
    - name: Install zsh and completions
      community.general.xbps:
        name:
          - zsh
          - zsh-completions
        state: latest

    - name: Set zsh as login shell for the ansible user
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /bin/zsh

    - name: Set zsh as login shell for root
      ansible.builtin.user:
        name: root
        shell: /bin/zsh

- name: "oh_my_zsh: framework install"
  when: "'oh_my_zsh' in packages_base_approved and 'zsh' in packages_base_approved"
  become: true
  become_user: "{{ ansible_user_id }}"
  ansible.builtin.shell: >-
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ ansible_user_id }}/.oh-my-zsh"

- name: "hyprland: compositor + example config"
  when: "'hyprland' in packages_base_approved"
  block:
    - name: Add hyprland-void community repo
      ansible.builtin.copy:
        dest: /etc/xbps.d/hyprland-void.conf
        content: "repository=https://raw.githubusercontent.com/sofijacom/hyprland-void/repository-x86_64-glibc\n"
        mode: "0644"

    - name: Refresh package index for the new repo
      community.general.xbps:
        update_cache: true

    - name: Install Hyprland and dependencies
      community.general.xbps:
        name:
          - hyprland
          - xorg-server-xwayland
          - xdg-desktop-portal-hyprland
          - xdg-desktop-portal
          - qt5-wayland
          - qt6-wayland
          - foot
          - wofi
          - Waybar
          - pipewire
          - wireplumber
          - elogind
          - dbus
          - wayland-protocols
          - mesa-dri
        state: latest

    - name: Enable seat management services
      ansible.builtin.file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - elogind
        - dbus

    - name: Ensure ~/.config/hypr exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user_id }}/.config/hypr"
        state: directory
        owner: "{{ ansible_user_id }}"
        mode: "0755"

    - name: Install example Hyprland config (won't overwrite an existing one)
      ansible.builtin.template:
        src: hyprland.conf.j2
        dest: "/home/{{ ansible_user_id }}/.config/hypr/hyprland.conf"
        owner: "{{ ansible_user_id }}"
        mode: "0644"
        force: false
      vars:
        hyprland_nvidia: "{{ 'nvidia' in packages_base_approved }}"

- name: "autologin_hyprland: TTY1 autologin + autostart"
  when: "'autologin_hyprland' in packages_base_approved and 'hyprland' in packages_base_approved"
  block:
    - name: Enable agetty autologin on TTY1
      ansible.builtin.lineinfile:
        path: /etc/sv/agetty-tty1/conf
        regexp: "^GETTY_ARGS="
        line: 'GETTY_ARGS="--noclear --autologin {{ ansible_user_id }}"'

    - name: Autostart Hyprland from .zprofile
      ansible.builtin.blockinfile:
        path: "/home/{{ ansible_user_id }}/.zprofile"
        create: true
        owner: "{{ ansible_user_id }}"
        mode: "0644"
        block: |
          if [ -z "$WAYLAND_DISPLAY" ] && [ "$XDG_VTNR" = "1" ]; then
              exec start-hyprland
          fi

- name: "neovim_fastfetch: editor + fetch tool"
  when: "'neovim_fastfetch' in packages_base_approved"
  block:
    - name: Install neovim
      community.general.xbps:
        name: neovim
        state: latest

    - name: Generate fastfetch config for the ansible user
      become: true
      become_user: "{{ ansible_user_id }}"
      ansible.builtin.command: fastfetch --gen-config
      args:
        creates: "/home/{{ ansible_user_id }}/.config/fastfetch/config.jsonc"

- name: "zen_browser: install via flatpak"
  when: "'zen_browser' in packages_base_approved"
  block:
    - name: Install flatpak
      community.general.xbps:
        name: flatpak
        state: present

    - name: Add flathub remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Zen Browser
      community.general.flatpak:
        name: app.zen_browser.zen
        state: present
        remote: flathub

- name: "ntp: chrony time sync"
  when: "'ntp' in packages_base_approved"
  block:
    - name: Install chrony
      community.general.xbps:
        name: chrony
        state: present

    - name: Enable chronyd service
      ansible.builtin.file:
        src: /etc/sv/chronyd
        dest: /var/service/chronyd
        state: link

- name: "boot_optimization: GRUB timeout, unused TTYs, btrfs mount opts"
  when: "'boot_optimization' in packages_base_approved"
  block:
    - name: Reduce GRUB timeout to 1s
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^GRUB_TIMEOUT="
        line: "GRUB_TIMEOUT=1"

    - name: Regenerate GRUB config
      ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true

    - name: Remove unused agetty TTYs (4-6)
      ansible.builtin.file:
        path: "/etc/runit/runsvdir/default/agetty-tty{{ item }}"
        state: absent
      loop: [4, 5, 6]

    - name: Ensure btrfs performance mount options for root are in fstab  # noqa: syntax-check[unknown-module]
      ansible.posix.mount:
        path: /
        src: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first }}"
        fstype: btrfs
        opts: ssd,discard=async,space_cache=v2,compress=zstd:3
        state: present

    - name: Note that a reboot is needed to apply the new mount options
      ansible.builtin.debug:
        msg: "fstab updated with btrfs mount options — reboot to remount / with them applied."
