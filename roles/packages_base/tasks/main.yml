---
- name: "Dns_fix: pin reliable DNS servers"
  block:
    - name: Write resolv.conf.head
      ansible.builtin.copy:
        dest: /etc/resolv.conf.head
        content: |
          nameserver 1.1.1.1
          nameserver 8.8.8.8
        mode: "0644"
      notify: Restart dhcpcd

- name: "Nvidia: proprietary driver + KMS"
  block:
    - name: Enable nonfree repo
      community.general.xbps:
        name: void-repo-nonfree
        state: latest

    - name: Refresh package index for the new repo
      ansible.builtin.include_tasks: refresh_index.yml

    - name: Install NVIDIA driver packages
      community.general.xbps:
        name:
          - nvidia
          - nvidia-vaapi-driver
        state: latest

    - name: Enable NVIDIA DRM kernel mode setting in GRUB cmdline
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        backrefs: true
        # Append the flag to whatever is already on the cmdline instead of
        # overwriting it; the lookahead makes this a no-op once present.
        regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*nvidia_drm\.modeset=1)[^"]*)"'
        line: '\1 nvidia_drm.modeset=1"'
      notify: Regenerate GRUB config

    - name: Load NVIDIA kernel modules at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/nvidia.conf
        content: |
          nvidia
          nvidia_modeset
          nvidia_uvm
          nvidia_drm
        mode: "0644"

- name: "Multilib: 32-bit libraries for Steam/Proton"
  block:
    - name: Enable multilib repos
      community.general.xbps:
        name:
          - void-repo-multilib
          - void-repo-multilib-nonfree
        state: latest

    - name: Refresh package index for the new repos
      ansible.builtin.include_tasks: refresh_index.yml

    - name: Install 32-bit base libraries
      community.general.xbps:
        name:
          - glibc-32bit
          - libgcc-32bit
          - libstdc++-32bit
          - nvidia-libs-32bit
        state: latest

- name: "Zsh: shell + completions"
  block:
    - name: Install zsh and completions
      community.general.xbps:
        name:
          - zsh
          - zsh-completions
        state: latest

    - name: Set zsh as login shell for the ansible user
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh

    - name: Set zsh as login shell for root
      ansible.builtin.user:
        name: root
        shell: /bin/zsh

- name: "Zsh_config: minimal managed config, no framework"
  block:
    - name: Remove Oh My Zsh (replaced by a plain zsh config)
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.oh-my-zsh"
        state: absent

    # Root only: the user's .zshrc comes from the dotfiles role (void.dot
    # ships a zshrc.d-based config). Root keeps this minimal managed copy;
    # personal tweaks for root belong in /root/.zshrc.local, which it
    # sources last.
    - name: Install minimal .zshrc for root
      ansible.builtin.copy:
        src: zshrc
        dest: /root/.zshrc
        owner: root
        group: root
        mode: "0644"

- name: "Hyprland: compositor"
  block:
    - name: Add hyprland-void community repo
      ansible.builtin.copy:
        dest: /etc/xbps.d/hyprland-void.conf
        content: "repository=https://raw.githubusercontent.com/sofijacom/hyprland-void/repository-x86_64-glibc\n"
        mode: "0644"

    # Key owner "hyprland-void-github-action". xbps-install prompts on
    # stdin before trusting a new repo signing key (deliberately ignoring
    # -y); under ansible stdin never answers, so the prompt blocks forever
    # — this was the "xbps hang" all along. Import the key once,
    # explicitly, before any module-driven sync meets the prompt.
    - name: Check whether the hyprland-void signing key is imported
      ansible.builtin.stat:
        path: "/var/db/xbps/keys/b3:21:c4:43:d9:38:6f:ec:36:64:0d:65:37:13:c1:fe.plist"
      register: packages_base_hyprland_key

    - name: Import the hyprland-void repo signing key
      ansible.builtin.command: xbps-install -S
      args:
        stdin: |
          y
          y
          y
      when: not packages_base_hyprland_key.stat.exists
      changed_when: true
      timeout: 120

    - name: Refresh package index for the new repo
      ansible.builtin.include_tasks: refresh_index.yml

    - name: Install Hyprland and dependencies
      community.general.xbps:
        name:
          - hyprland
          - xorg-server-xwayland
          - xdg-desktop-portal-hyprland
          - xdg-desktop-portal
          - qt5-wayland
          - qt6-wayland
          - foot
          - wofi
          - Waybar
          - pipewire
          - wireplumber
          - elogind
          - dbus
          - wayland-protocols
          - mesa-dri
        state: latest

    - name: Enable dbus service
      ansible.builtin.file:
        src: /etc/sv/dbus
        dest: /var/service/dbus
        state: link

    - name: Disable the elogind runit service (elogind is D-Bus activated)
      ansible.builtin.file:
        path: /var/service/elogind
        state: absent
      # pam_elogind activates elogind via D-Bus on the first login. With the
      # runit service also enabled, whichever copy starts second exits with
      # "elogind is already running" and runit restarts it every second,
      # spamming the TTY. Only D-Bus may start elogind.

- name: "Autologin_hyprland: TTY1 autologin + autostart"
  block:
    # Void ships /etc/sv/agetty-tty{2..6}/conf as symlinks to tty1's conf,
    # so editing tty1's would otherwise enable autologin on every TTY.
    # Replace the symlinks with a plain default conf first — all of them,
    # not just the enabled ones, so enabling tty4-6 later can't silently
    # bring autologin along.
    - name: Give TTY2-TTY6 their own default conf (unshare from TTY1)
      ansible.builtin.copy:
        dest: "/etc/sv/agetty-tty{{ item }}/conf"
        content: 'GETTY_ARGS="--noclear"'
        follow: false
        mode: "0644"
      loop: [2, 3, 4, 5, 6]

    - name: Enable agetty autologin on TTY1
      ansible.builtin.lineinfile:
        path: /etc/sv/agetty-tty1/conf
        regexp: "^GETTY_ARGS="
        line: 'GETTY_ARGS="--noclear --autologin {{ ansible_user }}"'

    - name: Delay TTY1 autologin until the D-Bus system bus is up
      ansible.builtin.blockinfile:
        path: /etc/sv/agetty-tty1/conf
        marker: "# {mark} ANSIBLE MANAGED: wait for dbus"
        block: |
          # This conf file is sourced by the agetty-tty1 run script, so it can
          # hold the ordering hack runit lacks: without dbus up, pam_elogind
          # can't register the autologin session (elogind is D-Bus activated)
          # and Hyprland gets no seat on the first attempt.
          _n=0
          while [ ! -S /run/dbus/system_bus_socket ] && [ "$_n" -lt 50 ]; do
              sleep 0.1
              _n=$((_n + 1))
          done

    - name: Ensure the user's XDG runtime dir exists at boot, before TTY1 autologin
      ansible.builtin.copy:
        dest: /etc/runit/core-services/06-user-runtime-dir.sh
        content: |
          #!/bin/sh
          # elogind doesn't reliably create /run/user/$UID in time for the
          # TTY1 autologin session, causing Hyprland to fail with
          # "couldn't create /run/user/$UID/hypr/...". Ensure it exists
          # ourselves during stage 1, before any service (incl. agetty) starts.
          uid=$(id -u {{ ansible_user }} 2>/dev/null) || exit 0
          mkdir -p "/run/user/$uid"
          chown {{ ansible_user }}:{{ ansible_user }} "/run/user/$uid"
          chmod 700 "/run/user/$uid"
        mode: "0644"

    - name: Autostart Hyprland from .zprofile
      ansible.builtin.blockinfile:
        path: "/home/{{ ansible_user }}/.zprofile"
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
        block: |
          # command -v guard: exec on a missing binary would kill the login
          # shell and put agetty's autologin into a tight respawn loop.
          if [ -z "$WAYLAND_DISPLAY" ] && [ "$XDG_VTNR" = "1" ] \
             && command -v start-hyprland >/dev/null 2>&1; then
              exec start-hyprland
          fi

- name: "Neovim_fastfetch: editor + fetch tool"
  block:
    - name: Install neovim
      community.general.xbps:
        name: neovim
        state: latest

    - name: Ensure ~/.config/fastfetch exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/fastfetch"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Generate fastfetch config for the ansible user
      become: true
      become_user: "{{ ansible_user }}"
      ansible.builtin.command: >-
        fastfetch --gen-config /home/{{ ansible_user }}/.config/fastfetch/config.jsonc
      args:
        creates: "/home/{{ ansible_user }}/.config/fastfetch/config.jsonc"

    - name: Ensure fastfetch config is owned by the ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.config/fastfetch/config.jsonc"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

# flatpak + flathub remote themselves come from the shared flathub role.
- name: "Zen_browser: install via flatpak"
  community.general.flatpak:
    name: app.zen_browser.zen
    state: latest
    remote: flathub

- name: "Ntp: chrony time sync"
  block:
    - name: Install chrony
      community.general.xbps:
        name: chrony
        state: latest

    - name: Enable chronyd service
      ansible.builtin.file:
        src: /etc/sv/chronyd
        dest: /var/service/chronyd
        state: link

- name: "Boot_optimization: GRUB timeout, unused TTYs, btrfs mount opts"
  block:
    - name: Reduce GRUB timeout to 1s
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^GRUB_TIMEOUT="
        line: "GRUB_TIMEOUT=1"
      notify: Regenerate GRUB config

    - name: Remove unused agetty TTYs (4-6)
      ansible.builtin.file:
        path: "/etc/runit/runsvdir/default/agetty-tty{{ item }}"
        state: absent
      loop: [4, 5, 6]

    - name: Look up the existing fstab entry for /
      ansible.builtin.command: awk '$1 !~ /^#/ && $2 == "/" { print; exit }' /etc/fstab
      register: packages_base_fstab_root_raw
      changed_when: false

    - name: Parse the fstab entry into fields
      ansible.builtin.set_fact:
        packages_base_fstab_root: "{{ packages_base_fstab_root_raw.stdout.split() }}"

    # Merge, don't replace: the mount module rewrites the options field
    # verbatim, and dropping an existing subvol=... would boot into the
    # wrong subvolume. Keep what's there and append missing perf flags.
    # jinja[invalid] is a lint false positive: it renders the opts template
    # with mock scalars, but at runtime both operands are lists (verified
    # against a real fstab line).
    - name: Ensure btrfs performance mount options for root are in fstab  # noqa: syntax-check[unknown-module] jinja[invalid]
      ansible.posix.mount:
        path: /
        src: "{{ packages_base_fstab_root[0] }}"
        fstype: btrfs
        opts: >-
          {{ (packages_base_root_opts
              + (packages_base_perf_opts | reject('in', packages_base_root_opts) | list))
             | join(',') }}
        state: present
      vars:
        packages_base_root_opts: "{{ packages_base_fstab_root[3].split(',') }}"
        packages_base_perf_opts:
          - ssd
          - discard=async
          - space_cache=v2
          - compress=zstd:3
      when:
        - packages_base_fstab_root | length >= 4
        - packages_base_fstab_root[2] == 'btrfs'

    - name: Note that a reboot is needed to apply the new mount options
      ansible.builtin.debug:
        msg: "fstab updated with btrfs mount options — reboot to remount / with them applied."
