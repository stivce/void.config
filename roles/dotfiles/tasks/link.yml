---
# Symlink every top-level entry of dotfiles_group.src into
# dotfiles_group.dest. Anything real (a non-symlink file or directory)
# already sitting at a destination — e.g. the fastfetch config generated
# by packages_base — is moved aside to <name>.pre-dotfiles, never
# deleted, then replaced by the link.

- name: "Find entries in {{ dotfiles_group.src }}"
  ansible.builtin.find:
    paths: "{{ dotfiles_group.src }}"
    file_type: any
    hidden: true
    recurse: false
    excludes: ".DS_Store"
  register: dotfiles_entries

- name: "Stat the link destinations in {{ dotfiles_group.dest }}"
  ansible.builtin.stat:
    path: "{{ dotfiles_group.dest }}/{{ item.path | basename }}"
  loop: "{{ dotfiles_entries.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: dotfiles_dest_stats

- name: "Move aside real files that would collide"
  ansible.builtin.command:
    argv:
      - mv
      - "{{ item.stat.path }}"
      - "{{ item.stat.path }}.pre-dotfiles"
  when: item.stat.exists and not item.stat.islnk
  loop: "{{ dotfiles_dest_stats.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  changed_when: true

- name: "Symlink entries into {{ dotfiles_group.dest }}"
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ dotfiles_group.dest }}/{{ item.path | basename }}"
    state: link
    force: true
    follow: false
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop: "{{ dotfiles_entries.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
