---
- name: Benchmark candidate mirrors
  ansible.builtin.uri:
    url: "{{ item }}/current/x86_64-repodata"
    method: HEAD
    timeout: 5
  register: system_mirror_timings
  loop: "{{ void_mirror_candidates }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
  failed_when: false

- name: Build list of successful mirror timings
  ansible.builtin.set_fact:
    system_mirror_results: >-
      {{ system_mirror_results | default([]) + [{'mirror': item.item, 'time': item.elapsed}] }}
  loop: "{{ system_mirror_timings.results }}"
  loop_control:
    label: "{{ item.item }}"
  # uri reports `elapsed` on failures too, and a refused connection fails
  # near-instantly — require an actual HTTP 200 or a dead mirror "wins".
  when:
    - item.status | default(-1) == 200
    - item.elapsed is defined

- name: Fail if no candidate mirror responded
  ansible.builtin.fail:
    msg: "None of the candidate mirrors responded — check network connectivity."
  when: system_mirror_results | default([]) | length == 0

- name: Pick the fastest responding mirror
  ansible.builtin.set_fact:
    system_fastest_mirror: "{{ (system_mirror_results | sort(attribute='time') | first).mirror }}"

- name: Report fastest mirror
  ansible.builtin.debug:
    msg: >-
      Fastest mirror: {{ system_fastest_mirror }}
      ({{ (system_mirror_results | selectattr('mirror', 'equalto', system_fastest_mirror) | first).time }}s)

- name: Configure fastest mirror as the main repository
  ansible.builtin.copy:
    dest: /etc/xbps.d/00-repository-main.conf
    content: "repository={{ system_fastest_mirror }}/current\n"
    mode: "0644"

# Without these overrides the nonfree/multilib repos keep using the
# /usr/share/xbps.d defaults, which point at repo-default.voidlinux.org
# (a CNAME to the repo-fi origin) — the fastest-mirror choice never
# applied to them. Same filenames as the defaults so they take precedence.
- name: Point sub-repositories at the fastest mirror too
  ansible.builtin.copy:
    dest: "/etc/xbps.d/10-repository-{{ item.name }}.conf"
    content: "repository={{ system_fastest_mirror }}/current/{{ item.path }}\n"
    mode: "0644"
  loop:
    - { name: nonfree, path: nonfree }
    - { name: multilib, path: multilib }
    - { name: multilib-nonfree, path: multilib/nonfree }

- name: Update package index and upgrade xbps itself
  ansible.builtin.include_tasks: xbps_sync.yml
  vars:
    system_xbps_sync_upgrade_xbps: true
    system_xbps_sync_timeout: 300

- name: Upgrade all installed packages
  ansible.builtin.include_tasks: xbps_sync.yml
  vars:
    system_xbps_sync_upgrade: true
    # Generous: a full upgrade legitimately downloads a lot. A hang now
    # costs 30 minutes instead of forever.
    system_xbps_sync_timeout: 1800

- name: Ensure timezone
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ void_timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Ensure keyboard layout in /etc/rc.conf
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^#?KEYMAP='
    line: 'KEYMAP="{{ void_keymap }}"'
    create: true
    mode: "0644"
